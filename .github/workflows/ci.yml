# go-openholidays — CI matrix workflow.
# Plan 05-05 (CI-01/CI-02/CI-03/CI-05/CI-07/TEST-10), restructured per PR #7
# review feedback into per-component jobs.
#
# Job topology (parallelism + cache locality):
#
#   library-test  → matrix Go 1.23/1.24/stable, scope `.` (root package).
#                   vet + race-test + coverage gate + Codecov upload on
#                   the stable leg. Library is the v0.1.0 deliverable.
#   library-lint  → golangci-lint scoped to `.` (root package). Single
#                   Go version (stable).
#   ohcli-test    → matrix Go versions, scope `./cmd/ohcli/...`. vet +
#                   race-test of the demo CLI.
#   ohcli-lint    → golangci-lint scoped to `./cmd/ohcli/...`.
#   ohcli-build   → go build + smoke `ohcli version` exec. Catches link
#                   errors and obvious binary-level regressions.
#   vuln          → govulncheck across the whole module. Single job —
#                   advisory data is module-wide so per-component split
#                   would duplicate work.
#
# Cache strategy (from terapia-si lessons learned, applied to our scale):
#
#   * SDK toolchain cache at /opt/hostedtoolcache/go keyed on runner.os +
#     go-version. setup-go's built-in `cache: true` does NOT cover the
#     SDK itself — without this we re-pay the ~100MB Go tarball download
#     on every matrix leg the runner image doesn't pre-install.
#   * `check-latest: true` is INTENTIONALLY DROPPED. It forces setup-go
#     to consult the version manifest even on a warm cache hit, often
#     pulling a fresh point release. We pin to "1.23.x" etc. and accept
#     whatever the runner has cached.
#   * setup-go's default `cache: true` continues to manage
#     ~/go/pkg/mod + ~/.cache/go-build keyed on go.sum — small surface
#     for a zero-dep library (testify is the only test-only dep) but
#     still saves a few seconds per job.
#
# Codecov: uses CODECOV_TOKEN from repo secrets. Token-based upload is
# preferred over OIDC here because id-token: write elevates the attack
# surface beyond what the library job needs.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  library-test:
    name: "library — tests (matrix)"
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.23.x", "1.24.x", "stable"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-${{ matrix.go-version }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify go.mod tidy
        if: matrix.go-version == 'stable'
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet (library)
        run: go vet .

      - name: go test (race + cover, library)
        run: go test -race -coverprofile=coverage.out -covermode=atomic .

      - name: Coverage gate (>= 85%)
        if: matrix.go-version == 'stable'
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "coverage: $pct%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 85.0) { print "coverage below 85%"; exit 1 } }'

      - name: Upload to Codecov
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: egeek-tech/go-openholidays
          fail_ci_if_error: false
          flags: library

  library-lint:
    name: "library — lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m .

  ohcli-test:
    name: "ohcli — tests (matrix)"
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.23.x", "1.24.x", "stable"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-${{ matrix.go-version }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet (ohcli)
        run: go vet ./cmd/ohcli/...

      - name: go test (race, ohcli)
        run: go test -race -count=1 ./cmd/ohcli/...

  ohcli-lint:
    name: "ohcli — lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./cmd/ohcli/...

  ohcli-build:
    name: "ohcli — build + smoke"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: go build
        run: go build -o ohcli ./cmd/ohcli

      - name: Smoke run — version subcommand
        run: ./ohcli version

  vuln:
    name: "vulnerabilities (govulncheck)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Go SDK toolchain
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
