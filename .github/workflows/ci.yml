# go-openholidays — CI matrix workflow.
# Plan 05-05 (CI-01/CI-02/CI-03/CI-05/CI-07/TEST-10).
#
# Three jobs:
#   - test: matrix on Go 1.23.x, 1.24.x, stable x ubuntu-latest. Runs
#     go vet + go build + go test -race -coverprofile. On the stable leg
#     additionally verifies `go mod tidy` is clean (CI-03), enforces the
#     85% coverage gate (TEST-10), and uploads to Codecov via @v5 OIDC
#     (CI-07 / D-09).
#   - lint: golangci-lint v2.12.2 against the committed .golangci.yml.
#   - vuln: govulncheck against the full module.
#
# Action versions pinned per Phase 5 RESEARCH Source-current notes:
# checkout@v4, setup-go@v5, codecov-action@v5, golangci-lint-action@v7,
# govulncheck-action@v1.
#
# Workflow-controlled inputs only: every `${{ ... }}` reference resolves
# to matrix entries or first-party action outputs. No untrusted
# user-controlled values (github.event.*) are interpolated into run:
# steps, so the standard command-injection guidance is not engaged.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.23.x", "1.24.x", "stable"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # id-token: write is required for codecov-action use_oidc: true on
    # the stable leg. Only the test job needs it; lint and vuln keep
    # the default least-privilege contents: read.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Verify go.mod tidy
        if: matrix.go-version == 'stable'
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race + cover)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage gate (>= 85%)
        if: matrix.go-version == 'stable'
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "coverage: $pct%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 85.0) { print "coverage below 85%"; exit 1 } }'

      - name: Upload to Codecov
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          slug: egeek-tech/go-openholidays
          use_oidc: true

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  vuln:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
