# go-openholidays — CI matrix workflow.
# Plan 05-05 (CI-01/CI-02/CI-03/CI-05/CI-07/TEST-10), restructured per PR #7
# review feedback into per-component jobs and a prep/cache-priming pattern.
#
# Job topology:
#
#   prep          → matrix Go 1.23/1.24/stable. Runs FIRST and is the ONLY
#                   job that pays the cold-cache cost of downloading the
#                   Go SDK toolchain and priming the Go module cache for
#                   each matrix variant. Every downstream job `needs: prep`
#                   and restores the relevant cache instead of re-paying
#                   ~100MB of SDK download.
#   library-test  → matrix Go 1.23/1.24/stable, scope `.` (root package).
#                   vet + race-test + coverage gate + Codecov upload on
#                   the stable leg. Library is the v0.1.0 deliverable.
#   library-lint  → golangci-lint scoped to `.` (root package). Single
#                   Go version (stable).
#   ohcli-test    → matrix Go versions, scope `./cmd/ohcli/...`. vet +
#                   race-test of the demo CLI.
#   ohcli-lint    → golangci-lint scoped to `./cmd/ohcli/...`.
#   ohcli-build   → go build + smoke `ohcli version` exec. Catches link
#                   errors and obvious binary-level regressions.
#   vuln          → govulncheck across the whole module. Single job —
#                   advisory data is module-wide so per-component split
#                   would duplicate work.
#
# Cache strategy:
#
#   * SDK toolchain cache at /opt/hostedtoolcache/go keyed on runner.os +
#     go-version. setup-go's built-in `cache: true` does NOT cover the
#     SDK itself — without an explicit actions/cache step we re-pay the
#     ~100MB Go tarball download on every matrix leg.
#   * `prep` primes the module cache via `go mod download` so setup-go's
#     post-step saves a non-empty cache under the canonical go.sum key.
#     Downstream jobs would otherwise restore a cache that only contains
#     whatever modules `prep` happened to pull, then redownload everything
#     and skip the save (setup-go skips save on cache-restore hit).
#   * `check-latest: true` is INTENTIONALLY DROPPED. It forces setup-go
#     to consult the version manifest even on a warm cache hit, often
#     pulling a fresh point release. We pin to "1.23.x" etc. and accept
#     whatever the runner has cached. EXCEPTION: the `vuln` job pins an
#     exact patched Go version (not `stable`) and skips the SDK-cache
#     restore — the govulncheck security gate must scan a toolchain with
#     the latest stdlib security fixes, which `stable` cannot guarantee
#     because setup-go resolves it against the actions/go-versions
#     manifest that lags the official go.dev release by days.
#
# Security:
#
#   * All third-party actions pinned to a 40-char commit SHA (the
#     trailing `# vN.M.P` comment is a documentation hint for humans
#     and Dependabot, NOT consulted by the runner). SHA pins defend
#     against tag-rewrite supply-chain attacks. The egeek-tech org
#     policy rejects tag-only pins; SHA pins are mandatory.
#   * No untrusted event-payload values reach a `run:` step. Every
#     `${{ ... }}` reference resolves to matrix entries, first-party
#     action outputs, or the repo-scoped CODECOV_TOKEN. None of the
#     risky inputs from the GitHub Actions workflow-injection guide
#     (https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/)
#     are interpolated into a shell.
#   * Codecov upload uses CODECOV_TOKEN from repo secrets. Token-based
#     upload is preferred over OIDC here because `id-token: write`
#     elevates the attack surface beyond what the library job needs.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  prep:
    name: "Prep (Go SDK toolchain + module cache, populates cache)"
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x", "1.25.x", "stable"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Cache Go SDK toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-${{ matrix.go-version }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Prime Go module cache
        run: go mod download

  library-test:
    name: "library — tests (matrix)"
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x", "1.25.x", "stable"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore Go SDK toolchain cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-${{ matrix.go-version }}
          fail-on-cache-miss: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify go.mod tidy
        if: matrix.go-version == 'stable'
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet (library)
        run: go vet .

      - name: go test (race + cover, library)
        run: go test -race -coverprofile=coverage.out -covermode=atomic .

      - name: Coverage gate (>= 85%)
        if: matrix.go-version == 'stable'
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "coverage: $pct%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 85.0) { print "coverage below 85%"; exit 1 } }'

      - name: Upload to Codecov
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: egeek-tech/go-openholidays
          fail_ci_if_error: false
          flags: library

  library-lint:
    name: "library — lint"
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore Go SDK toolchain cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable
          fail-on-cache-miss: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint (library scope, all build tags, unlimited issues)
        # --build-tags=integration so the nightly-only files
        # (integration_test.go, update_fixtures_test.go) are linted on
        # every PR instead of falling through to the live integration
        # workflow that doesn't lint at all.
        #
        # --max-issues-per-linter=0 --max-same-issues=0 disable
        # golangci-lint's default per-linter / per-issue caps (50 / 3).
        # Caps make a real fail batch look small in the log; with 0/0
        # CI surfaces every finding in one run so the contributor sees
        # the complete set and isn't surprised by a follow-up wave.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m --build-tags=integration --max-issues-per-linter=0 --max-same-issues=0 .

  ohcli-test:
    name: "ohcli — tests (matrix)"
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x", "1.25.x", "stable"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore Go SDK toolchain cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-${{ matrix.go-version }}
          fail-on-cache-miss: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet (ohcli)
        run: go vet ./cmd/ohcli/...

      - name: go test (race, ohcli)
        run: go test -race -count=1 ./cmd/ohcli/...

  ohcli-lint:
    name: "ohcli — lint"
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore Go SDK toolchain cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable
          fail-on-cache-miss: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: Run golangci-lint (ohcli scope, unlimited issues)
        # See library-lint for the rationale on `--max-issues-per-linter=0
        # --max-same-issues=0`. No --build-tags here because cmd/ohcli has
        # no integration-tagged files (only the root library carries them).
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m --max-issues-per-linter=0 --max-same-issues=0 ./cmd/ohcli/...

  ohcli-build:
    name: "ohcli — build + smoke"
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Restore Go SDK toolchain cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/hostedtoolcache/go
          key: ${{ runner.os }}-go-sdk-stable
          fail-on-cache-miss: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: go build
        run: go build -o ohcli ./cmd/ohcli

      - name: Smoke run — version subcommand
        run: ./ohcli version

  vuln:
    name: "vulnerabilities (govulncheck)"
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # The govulncheck security gate must scan against a Go stable that
      # carries the latest stdlib security fixes. We pin the EXACT patched
      # version rather than `go-version: stable`, and deliberately skip the
      # shared `Linux-go-sdk-stable` SDK-cache restore the other jobs use:
      # both of those routes resolve through the actions/go-versions
      # manifest (or a warm cache of it), which lags the official go.dev
      # release by days. When go1.26.4 shipped the fixes for GO-2026-5039
      # (net/textproto) and GO-2026-5037 (crypto/x509), the manifest still
      # topped out at the vulnerable go1.26.3, so the gate kept failing on
      # unmitigatable stdlib call paths (io.Copy, fmt.Sprintf). setup-go
      # downloads an exact pinned version directly from go.dev even before
      # the manifest catches up. Bump this when a newer patch fixes an
      # advisory the gate flags.
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: "1.26.4"
          cache: true

      # Inlined instead of `golang/govulncheck-action` because that
      # composite action internally uses `actions/checkout@v4.1.1` and
      # `actions/setup-go@v5.0.0` (tag pins) which the egeek-tech org
      # policy rejects transitively. The action's body is small enough
      # to inline — `go install` + a single `govulncheck` invocation.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
