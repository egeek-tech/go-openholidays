# go-openholidays — consolidated release workflow.
#
# Single job, two phases, in the same workflow run:
#
#   Phase 1 — Release Please (PR + tag only, NO GitHub Release):
#     On every push to master, scans Conventional Commits since the
#     last release tag and either:
#       a) opens/updates a "Release PR" (when there are release-worthy
#          commits since the last tag, but no Release PR is open yet),
#       b) when a Release PR is merged: pushes the `vX.Y.Z` annotated
#          tag, rewrites `version.go` via the
#          `// x-release-please-version` marker, updates `CHANGELOG.md`
#          and `.release-please-manifest.json`. With `skip-github-
#          release: true`, the action does NOT create the GitHub Release
#          object — that's goreleaser's job in Phase 2.
#
#     Why skip GitHub Release here: this repo auto-marks published
#     Releases as immutable (observed on v0.2.0..v0.2.3). An immutable
#     release blocks POST /releases/:id/assets, which is exactly what
#     goreleaser does next. Letting goreleaser create the release fresh
#     means the whole draft → upload → publish lifecycle stays inside
#     one mutable window.
#
#     Earlier attempt to use release-please's draft=true also failed —
#     in draft mode the action ALSO skips pushing the tag (only creates
#     a draft GH Release), leaving v0.2.4 / v0.3.0 as zombie drafts
#     with no tag and the Phase 2 checkout step failing.
#
#   Phase 2 — Build + create release + attest (gated on `release_created`):
#     When Phase 1 cut a tag in THIS run, the same job continues:
#       - Check out the new tag (it exists because Phase 1 pushed it).
#       - Goreleaser builds 6 binaries + checksums.txt, then creates a
#         DRAFT GitHub Release (`release.draft: true` in
#         .goreleaser.yaml) and uploads all 7 assets to it.
#       - actions/attest-build-provenance signs ./dist/checksums.txt
#         and attaches the attestation to the draft release.
#       - Final step: `gh release edit vX.Y.Z --draft=false` flips the
#         draft bit, which is the moment GitHub auto-marks the release
#         immutable. By then every asset + attestation is already in
#         place.
#
#     Phase 2 lives in the same job DELIBERATELY: a tag pushed by
#     GITHUB_TOKEN does NOT trigger downstream workflows (GitHub anti-
#     loop guard). The App token (Phase 1) DOES cascade, but keeping
#     Phase 2 inline avoids the dependency on cascade-vs-no-cascade
#     and keeps the release lifecycle in one journal.
#
# GitHub App identity (`egeek-tech-release-bot`, see docs/release-bot.md):
#     release-please-action is given a token minted from the
#     egeek-tech-release-bot GitHub App via actions/create-github-app-
#     token. Two reasons:
#       (a) Cascading CI on Release PRs. When release-please opens its
#           PR using the default GITHUB_TOKEN, the GitHub anti-loop
#           guard blocks the ci.yml downstream workflow from firing on
#           that PR — so required status checks (lint, tests matrix,
#           govulncheck) never run and branch protection holds the PR
#           BLOCKED indefinitely. PR #21 / v0.2.4 release sat in this
#           state for hours. A GitHub App is a separate principal and
#           its actions DO cascade workflows, so the Release PR gets
#           a normal CI matrix run.
#       (b) Audit clarity. PRs authored by `egeek-tech-release-bot[bot]`
#           are visually distinct from human-authored PRs and from
#           default-GITHUB_TOKEN actions.
#     Secrets consumed: RELEASE_BOT_APP_CLIENT_ID, RELEASE_BOT_APP_PRIVATE_KEY
#     (org-level). `app-id` was deprecated by create-github-app-token in
#     favor of `client-id` (App's OAuth Client ID, distinct from the
#     numeric App ID); the secret RELEASE_BOT_APP_ID is left in place for
#     other consumers but no longer referenced by this workflow.
#     Token is minted once at the top of the job and
#     reused by every step that would otherwise reach for GITHUB_TOKEN
#     for release-write operations (release-please-action, goreleaser
#     env, gh release edit). First-party actions that use OIDC
#     (attest-build-provenance) or only read (checkout, setup-go) keep
#     the default GITHUB_TOKEN.
#
# Permissions union of both phases:
#   - contents:      write  (release-please cuts tag/Release; goreleaser uploads assets)
#   - pull-requests: write  (release-please opens/updates the Release PR)
#   - id-token:      write  (attest-build-provenance OIDC for Sigstore/Fulcio keyless signing)
#   - attestations:  write  (attest-build-provenance attaches attestations to the Release)
#
# Action pinning policy:
#   * All third-party actions pinned to a 40-char commit SHA (egeek-tech
#     org policy). `# vN.M.P` is a Dependabot hint, NOT consulted by
#     the runner.
#
# Security notes:
#   * Trigger is push to master only — code that ran this workflow has
#     already passed PR review.
#   * No untrusted event-payload values reach a `run:` step.
#   * The App private key never leaves the runner — actions/create-
#     github-app-token exchanges it for a short-lived (1 hour) repo-
#     scoped token at job start, and only that token is passed to
#     downstream steps.
name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release, e.g. v0.4.0'
        required: true
        type: string
      sha:
        description: 'Commit SHA the tag should point at (only used if the tag does not already exist on origin)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: "Release — release-please + goreleaser + attest"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      # Mint a short-lived (1 h) token from the egeek-tech-release-bot
      # GitHub App. Reused by every step below that needs to write to
      # the repo as the bot principal. See docs/release-bot.md for the
      # full setup + operator runbook.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      # PHASE 1 — release-please opens Release PRs and, on PR merge,
      # pushes the tag + creates a DRAFT GH Release. The combination is
      # configured in release-please-config.json:
      #   "draft": true              → release created as draft
      #   "force-tag-creation": true → tag pushed to origin via git/refs
      #                                BEFORE the draft release is created
      #
      # Verified in release-please core (github-api.ts:667-695): with
      # forceTag: true, octokit.git.createRef pushes refs/tags/vX.Y.Z to
      # origin first, then repos.createRelease creates the draft release
      # attached to that tag. Outputs release_created + tag_name are set
      # in both cases (drafted and non-drafted) — see manifest.ts:1322-1341.
      #
      # Why this combination, and not the alternatives:
      #   * draft: false alone → release publishes immediately → GitHub
      #     auto-marks it immutable on this repo → goreleaser asset upload
      #     returns 422 (observed v0.2.0..v0.2.3, run 26632385497 log).
      #   * draft: true alone → "lazy tag creation": per release-please's
      #     own JSON schema, "GitHub does not create a Git tag for draft
      #     releases until they are published" → Phase 2 checkout fails
      #     (observed v0.2.4 / v0.3.0).
      #   * skip-github-release: true → action.yml says "do not try to
      #     tag releases"; src/index.ts:130-144 confirms createReleases()
      #     is skipped entirely, no tag pushed, no outputs set. Phase 2
      #     gate would always be false.
      #
      # `token:` swaps in the App-minted token so the tag push + Release
      # PR creation cascade ci.yml correctly (default GITHUB_TOKEN does
      # NOT cascade per GitHub's anti-loop guard).
      - name: release-please
        id: release
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # ─────────────────────────────────────────────────────────────
      # Dispatch-triggered recovery path: push the missing tag, then
      # let Phase 2 below run against it. Used for drafts created by
      # the previous broken pipeline (v0.2.4 / v0.3.0 / v0.4.0) that
      # never had their tags pushed.
      # ─────────────────────────────────────────────────────────────
      - name: Push tag for dispatch recovery
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ inputs.tag }}
          SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" --silent 2>/dev/null; then
            echo "Tag $TAG already exists on origin — skipping creation."
          else
            echo "Creating tag $TAG -> $SHA on origin via git/refs API."
            gh api -X POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$TAG" \
              -f "sha=$SHA"
          fi

      # Compute the tag Phase 2 should run against, from whichever
      # entry point fired.
      - name: Resolve target tag
        id: tag
        if: |
          (github.event_name == 'push' && steps.release.outputs.release_created == 'true') ||
          github.event_name == 'workflow_dispatch'
        env:
          PUSH_TAG: ${{ steps.release.outputs.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "push" ]; then
            echo "name=$PUSH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          fi

      # PHASE 2 — runs ONLY when release-please cut a new release in
      # this run. `release_created` is the string "true" when a tag
      # + GitHub Release were just produced; otherwise the output is
      # absent and these steps are skipped.

      # Re-checkout with full history at the newly-cut tag. Without
      # this, goreleaser's `git describe` can fail to see the tag
      # release-please just pushed via API (the initial checkout was
      # before the tag existed).
      # ─────────────────────────────────────────────────────────────
      # PHASE 2 — build, attest, publish. Runs for both entry points
      # (push that produced a tag, OR workflow_dispatch).
      # Gating: every Phase 2 step uses `steps.tag.outputs.name != ''`
      # so the steps only run when the previous Resolve-target-tag step
      # actually produced a tag to operate on.
      # ─────────────────────────────────────────────────────────────
      - name: Check out at the target tag
        if: steps.tag.outputs.name != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.name }}
          fetch-depth: 0

      - name: Set up Go
        if: steps.tag.outputs.name != ''
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: stable

      # goreleaser adopts the existing draft GH Release for this tag
      # (per .goreleaser.yaml: use_existing_draft: true + mode: replace),
      # builds 6 binaries + checksums.txt, uploads them as assets, and
      # overwrites the draft's body with its own changelog (bounded by
      # the previous git tag on origin, filtered per changelog.filters
      # in .goreleaser.yaml).
      - name: Run goreleaser
        if: steps.tag.outputs.name != ''
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Sign the checksums manifest, not each binary — checksums.txt
      # SHA-256-fingerprints every released archive, so attesting the
      # manifest transitively covers every binary in one attestation.
      - name: Attest binaries via subject-checksums
        if: steps.tag.outputs.name != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-checksums: ./dist/checksums.txt

      # Final un-draft. By here: tag exists on origin, 7 assets uploaded
      # to the draft, attestation written to the attestations API. The
      # moment we un-draft, GitHub auto-marks the release immutable —
      # by then everything that needed to write is done. `gh release
      # edit --draft=false` on an already-published release is a no-op.
      - name: Publish release (draft → published)
        if: steps.tag.outputs.name != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
