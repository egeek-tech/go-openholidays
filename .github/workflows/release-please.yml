# go-openholidays — consolidated release workflow.
#
# Single job, two phases, in the same workflow run:
#
#   Phase 1 — Release Please:
#     On every push to master, scans Conventional Commits since the
#     last release tag and either:
#       a) opens/updates a "Release PR" (when there are release-worthy
#          commits since the last tag, but no Release PR is open yet),
#       b) cuts the release when a Release PR is merged (creates the
#          `vX.Y.Z` annotated tag + GitHub Release with auto-generated
#          notes), `version.go` is rewritten via the
#          `// x-release-please-version` marker, `CHANGELOG.md` is
#          updated, `.release-please-manifest.json` is bumped.
#
#   Phase 2 — Build + attest (gated on `release_created`):
#     When Phase 1 cut a release in THIS run, the same job continues
#     with goreleaser + attest-build-provenance. Phase 2 lives in
#     the same job DELIBERATELY: a tag pushed by GITHUB_TOKEN does
#     NOT trigger downstream workflows (GitHub anti-loop guard for
#     GITHUB_TOKEN). Putting goreleaser in a separate workflow keyed
#     on `push:tags:v*` therefore SILENTLY DROPS — observed during
#     the v0.2.0 release: tag landed but no binaries were ever built.
#     Same-job execution sidesteps the cascade entirely.
#
# GitHub App identity (`egeek-tech-release-bot`, see docs/release-bot.md):
#     release-please-action is given a token minted from the
#     egeek-tech-release-bot GitHub App via actions/create-github-app-
#     token. Two reasons:
#       (a) Cascading CI on Release PRs. When release-please opens its
#           PR using the default GITHUB_TOKEN, the GitHub anti-loop
#           guard blocks the ci.yml downstream workflow from firing on
#           that PR — so required status checks (lint, tests matrix,
#           govulncheck) never run and branch protection holds the PR
#           BLOCKED indefinitely. PR #21 / v0.2.4 release sat in this
#           state for hours. A GitHub App is a separate principal and
#           its actions DO cascade workflows, so the Release PR gets
#           a normal CI matrix run.
#       (b) Audit clarity. PRs authored by `egeek-tech-release-bot[bot]`
#           are visually distinct from human-authored PRs and from
#           default-GITHUB_TOKEN actions.
#     Secrets consumed: RELEASE_BOT_APP_CLIENT_ID, RELEASE_BOT_APP_PRIVATE_KEY
#     (org-level). `app-id` was deprecated by create-github-app-token in
#     favor of `client-id` (App's OAuth Client ID, distinct from the
#     numeric App ID); the secret RELEASE_BOT_APP_ID is left in place for
#     other consumers but no longer referenced by this workflow.
#     Token is minted once at the top of the job and
#     reused by every step that would otherwise reach for GITHUB_TOKEN
#     for release-write operations (release-please-action, goreleaser
#     env, gh release edit). First-party actions that use OIDC
#     (attest-build-provenance) or only read (checkout, setup-go) keep
#     the default GITHUB_TOKEN.
#
# Permissions union of both phases:
#   - contents:      write  (release-please cuts tag/Release; goreleaser uploads assets)
#   - pull-requests: write  (release-please opens/updates the Release PR)
#   - id-token:      write  (attest-build-provenance OIDC for Sigstore/Fulcio keyless signing)
#   - attestations:  write  (attest-build-provenance attaches attestations to the Release)
#
# Action pinning policy:
#   * All third-party actions pinned to a 40-char commit SHA (egeek-tech
#     org policy). `# vN.M.P` is a Dependabot hint, NOT consulted by
#     the runner.
#
# Security notes:
#   * Trigger is push to master only — code that ran this workflow has
#     already passed PR review.
#   * No untrusted event-payload values reach a `run:` step.
#   * The App private key never leaves the runner — actions/create-
#     github-app-token exchanges it for a short-lived (1 hour) repo-
#     scoped token at job start, and only that token is passed to
#     downstream steps.
name: Release

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  release:
    name: "Release — release-please + goreleaser + attest"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      # Mint a short-lived (1 h) token from the egeek-tech-release-bot
      # GitHub App. Reused by every step below that needs to write to
      # the repo as the bot principal. See docs/release-bot.md for the
      # full setup + operator runbook.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      # PHASE 1 — release-please scans commits + manages tag/Release.
      # The `token:` input swaps in the App-minted token so Release PRs
      # are authored by `egeek-tech-release-bot[bot]` instead of
      # github-actions[bot]. Without this swap, branch protection blocks
      # merging because ci.yml never fires on the Release PR (anti-loop
      # guard on GITHUB_TOKEN).
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # PHASE 2 — runs ONLY when release-please cut a new release in
      # this run. `release_created` is the string "true" when a tag
      # + GitHub Release were just produced; otherwise the output is
      # absent and these steps are skipped.

      # Re-checkout with full history at the newly-cut tag. Without
      # this, goreleaser's `git describe` can fail to see the tag
      # release-please just pushed via API (the initial checkout was
      # before the tag existed).
      - name: Check out at the new tag
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: stable

      - name: Run goreleaser
        if: ${{ steps.release.outputs.release_created }}
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use the App token so the asset uploads are attributed to
          # the bot, matching the principal that drafted the release in
          # Phase 1.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Sign the checksums manifest, not each binary — checksums.txt
      # SHA-256-fingerprints every released archive, so attesting the
      # manifest transitively attests every binary. Cheaper than a
      # per-binary attestation step.
      - name: Attest binaries via subject-checksums
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt

      # Publish the release — release-please-config.json sets draft:true
      # so the release stays mutable while goreleaser uploads assets +
      # attest signs the checksums manifest. GitHub flips published
      # releases to immutable automatically on this repo (observed on
      # v0.2.0/v0.2.1/v0.2.2: the existing release returned 422 to every
      # POST /assets), so the upload phase has to finish against a draft.
      # After attestation lands we flip draft=false here, which is the
      # transition that lets the release surface on the public Releases
      # tab. Idempotent — `gh release edit --draft=false` on an already-
      # published release is a no-op.
      - name: Publish release (draft → published)
        if: ${{ steps.release.outputs.release_created }}
        env:
          # App token keeps the un-draft transition attributed to the
          # same principal as the rest of the release.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
