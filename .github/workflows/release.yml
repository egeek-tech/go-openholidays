# go-openholidays — tag-triggered release workflow (CI-05 / REL-03 / D-11).
#
# Fires only on tag pushes matching `v*` (e.g. v0.1.0, v0.1.0-rc1). Tag
# protection in repo settings restricts who can push these tags — out of
# scope to enforce in YAML but documented in PROJECT.md.
#
# Two-step release:
#   1. goreleaser/goreleaser-action@v7 with version "~> v2" reads
#      .goreleaser.yaml at repo root, builds the 6-binary matrix, archives
#      them, generates checksums.txt, and publishes a GitHub Release.
#   2. actions/attest-build-provenance@v4 (NOT @v1 per Phase 5 RESEARCH
#      Pitfall 2 — @v1/@v2/@v3 are deprecated wrappers) signs the
#      ./dist/checksums.txt manifest. Because checksums.txt covers every
#      binary by SHA-256, signing the manifest transitively attests every
#      released binary without a per-binary attestation step.
#
# Permissions (REQUIRED for the attestation flow per docs.github.com):
#   - contents: write — goreleaser uploads release assets.
#   - id-token: write — Sigstore/Fulcio OIDC for keyless signing.
#   - attestations: write — attach attestations to the release artifacts.
#
# Triggers deliberately omitted:
#   - pull_request_target: NOT present (security best practice — would let
#     a hostile fork PR run the release flow with elevated permissions).
#   - workflow_dispatch: NOT present in v0.1.0 (tag-only policy is locked;
#     manual dispatch can be added in v0.2.x if a need surfaces).
#
# Security note — no untrusted input is interpolated into any run: step.
# The only step that sets env: is the goreleaser step, which receives the
# default GITHUB_TOKEN scoped by the top-level permissions: block. No
# `github.event.*` references, no head_ref, no author-controlled values.
#
# Action pinning policy:
#   * All third-party actions pinned to a 40-char commit SHA (the
#     trailing `# vN.M.P` comment is a documentation hint for humans
#     and Dependabot, NOT consulted by the runner). The egeek-tech org
#     policy rejects tag-only pins; SHA pins are mandatory.
#   * Dependabot keeps the SHA pins fresh — see .github/dependabot.yml
#     (github-actions ecosystem).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0 # required for goreleaser changelog generation

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: stable

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest binaries via subject-checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
