# go-openholidays — goreleaser v2 configuration (Plan 05-06, CI-05 / REL-03).
#
# Driven from the consolidated release workflow
# (.github/workflows/release-please.yml). When release-please cuts a
# new tag + GitHub Release on master, the same workflow run continues
# (gated on `steps.release.outputs.release_created`) into goreleaser,
# which builds six binaries (3 OS x 2 arch) per this config + produces
# archives + checksums.txt, then `actions/attest-build-provenance@v4`
# signs ./dist/checksums.txt (D-11).
#
# Same-workflow execution is deliberate: a tag pushed by GITHUB_TOKEN
# does NOT cascade to a separate workflow (GitHub's anti-loop guard).
# The standalone release.yml that used to live alongside this config
# silently no-op'd when release-please created v0.2.0 — observed,
# removed, replaced by the consolidated flow.
#
# Deferred per D-10 — NOT present in this config: no `brews:` (Homebrew tap),
# no `signs:` (cosign — attestations cover provenance), no `source:` (source
# tarball), no `sboms:` block.
#
# W-05 ldflags Version inject — version.go declares
# `var Version = "0.X.Y"` with NO leading `v`. Goreleaser's `.Version`
# template variable is documented to be the current tag with the `v`
# prefix already stripped (https://goreleaser.com/customization/templates/:
# ".Version — Current Git tag without v prefix"), so plain `{{ .Version }}`
# matches the literal in version.go exactly and there is no User-Agent
# divergence between a goreleaser-built binary and a local `go build`.
#
# Earlier revisions wrapped this in `{{ trimPrefix "v" .Version }}`, which
# is BOTH redundant (nothing to trim) AND broken — `trimPrefix` is not a
# registered goreleaser template function. The v0.2.1 release (workflow
# run 26605628217) aborted with `template: function "trimPrefix" not
# defined`, which is why that tag and v0.2.0 carry zero binary assets.
version: 2

project_name: go-openholidays

before:
  hooks:
    - go mod tidy

builds:
  - id: ohcli
    main: ./cmd/ohcli
    binary: ohcli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/egeek-tech/go-openholidays.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: ohcli-archive
    name_template: "ohcli_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: egeek-tech
    name: go-openholidays
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^chore\('
      - '^docs:'
      - '^docs\('
      - '^test:'
      - '^test\('
      - '^style:'
      - '^style\('
      - '^refactor:'
      - '^refactor\('
      - '^ci:'
      - '^ci\('
      - typo
      - merge conflict
