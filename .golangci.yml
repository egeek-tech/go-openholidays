# go-openholidays — golangci-lint v2 configuration.
#
# 2026-05-28 — exclusions reset. Every exclusion / disabled-rule entry that
# previously lived here was inherited from another project, not motivated
# by a real false positive observed in go-openholidays. They are removed
# wholesale; targeted exclusions will be re-added only when a specific
# false positive surfaces during a real CI run with rationale captured
# inline.
version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    # The six linters mandated by PROJECT.md / CLAUDE.md.
    - govet
    - errcheck
    - staticcheck
    - gosec
    - revive
    - gocritic
    # godoclint — added 2026-05-29. Enforces godoc conventions: only one
    # canonical package godoc per package (`single-pkg-doc`), every
    # stdlib type reference uses the Go 1.19+ doclink syntax
    # `[pkg.Type]` for clickable pkg.go.dev rendering
    # (`require-stdlib-doclink`), and basic safeguards from the `basic`
    # rule set. See settings.godoclint for the exact rule list and
    # rationale on what's intentionally NOT enabled.
    - godoclint
    # HTTP-client SDK criticals — added 2026-05-28. Without bodyclose a
    # missing `defer resp.Body.Close()` leaks sockets in long-lived consumer
    # processes (the SDK is, by design, long-lived). Without noctx an
    # `http.NewRequest` or package-level `http.Get` could land that bypasses
    # the ctx-as-first-arg contract PROJECT.md locks in (CL-21).
    - bodyclose
    - noctx
    # Curated additions retained from .golangci.yml_backup that proved
    # useful during Phases 1-4.
    - asciicheck
    - copyloopvar
    - durationcheck
    - contextcheck
    - errchkjson
    - errname
    - fatcontext
    - gomoddirectives
    - ineffassign
    - intrange
    - mirror
    - musttag
    - nilerr
    - sloglint
    - testifylint
    - thelper
    - unconvert
    # unparam: disabled 2026-05-11. 13 findings split between real code
    # smells (dead returns / dead params / a stub `buildLazyModal` whose
    # every branch returns nil) and test-helper future-flex parameters.
    # Needs case-by-case judgment, not a blanket fix.
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    # tagliatelle: NOT enabled. Upstream OpenHolidays wire format is camelCase
    # (isoCode, startDate, etc.); enforcing a case scheme on JSON tags would
    # require either the wrong setting (snake) or a setting that matches
    # upstream (camel) — and the latter adds no value over "match upstream
    # verbatim." See Phase 5 RESEARCH.md Pitfall 4.
  settings:
    godoclint:
      # `basic` set = pkg-doc + single-pkg-doc + start-with-name + deprecated.
      # All four are universal Go godoc conventions; turning them off would
      # only make sense for a non-library binary.
      default: basic
      enable:
        # require-stdlib-doclink — flags bare `pkg.Type` references in
        # godoc comments that should be the Go 1.19+ doclink form
        # `[pkg.Type]`. pkg.go.dev renders the bracketed form as a
        # clickable link to the type's documentation; the bare form
        # renders as plain text. Worth ~100 small edits for the UX win.
        - require-stdlib-doclink
        # no-unused-link — flags `[link]` references in godoc that point
        # at nothing. Cheap insurance against future copy-paste rot.
        - no-unused-link
      # NOT enabled and the reasons:
      #
      #   max-len — defaults to 77 chars/line in godoc. Go community
      #     convention is closer to 80-100. Our codebase regularly sits
      #     at 78-89. Enabling at the default would produce ~13 noise
      #     findings with no readability gain.
      #
      #   require-doc — would force a doc comment on every exported
      #     symbol. revive (which we have on) already enforces the same
      #     contract via the `exported` rule for production code. The
      #     `require-doc` add-on additionally fires on Test* functions
      #     in test files, which we explicitly do NOT require (Gold
      #     Rule 3 covers TestXxx structure, not godoc presence).
    usetesting:
      # Enable Go 1.24+ replacements. The default usetesting config is
      # conservative — `context-background` is OFF by default. We bumped
      # the floor to Go 1.24 (see go.mod) so `t.Context()` is universally
      # available; turn the check on so tests get `t.Context()` instead
      # of `context.Background()`. Auto-fixable via `golangci-lint run --fix`.
      context-background: true
      context-todo: true
      # `os-setenv`, `os-create-temp`, etc. retain their defaults (true).
    errcheck:
      # Re-added 2026-05-28 after exclusion reset surfaced real signal.
      # Each excluded function has a project-specific justification:
      #
      #   fmt.Fprint / Fprintf / Fprintln — used by cmd/ohcli handlers to
      #     write usage messages, error lines, and rendered output to
      #     stderr/stdout. The io.Writer is os.Stderr / os.Stdout, both
      #     of which essentially never fail; if they did fail there is
      #     nowhere meaningful to surface the error. Mass-noisy without
      #     this exclusion.
      #
      #   (*github.com/egeek-tech/go-openholidays.Client).Close — the
      #     library's own Close. Documented as idempotent + returns nil
      #     on subsequent calls (CLIENT-08). example_test.go uses the
      #     canonical `defer c.Close()` doctest idiom that pkg.go.dev
      #     surfaces; wrapping every example with `defer func() { _ = ... }()`
      #     would clutter the rendered docs for zero functional gain.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*github.com/egeek-tech/go-openholidays.Client).Close
  exclusions:
    rules:
      # G304: gosec flags os.Open / os.ReadFile when the path is variable.
      # Re-added 2026-05-28: fuzz_test.go and retry_test.go read fixtures
      # from a hard-coded testdata subtree on a fresh CI checkout. No
      # untrusted input reaches the path, and the testdata content is
      # under version control. Scoped to _test.go so production paths
      # still get the warning.
      - linters:
          - gosec
        text: "G304"
        path: _test\.go
formatters:
  # golangci-lint v2 split formatters out of `linters:`. gofmt with the `-s`
  # simplifications keeps CI parity with goreportcard.com (which runs
  # `gofmt -s` server-side).
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
